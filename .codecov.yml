codecov:
  # Require CI to pass before posting coverage reports
  # Prevents noise from failed builds affecting coverage metrics
  require_ci_to_pass: yes
  coverage:
    precision: 2
    round: down
    # Rounding down ensures we don't over-report coverage
    # This is conservative but prevents false confidence in borderline cases
    status:
      project:
        default:
          # Target coverage threshold - currently 80%
          # TODO: Evaluate raising to 85% after Q2 refactoring sprint
          # NOTE: 2026-03-07 - Keeping at 80% until migration to new test framework completes
          target: 80%

