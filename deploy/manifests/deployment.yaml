apiVersion: apps/v1
kind: Deployment
metadata:
  name: guardian-webhook
  namespace: guardian-system
  labels:
    app: guardian
  # NOTE(rk): This deployment uses a single replica by default for development.
  # For production workloads, consider increasing replicas and adding pod
  # anti-affinity rules to ensure high availability across nodes.
  # See docs/adr/002-canary-strategy.md for rollout considerations.
spec:
  replicas: 1
  selector:
    matchLabels:
      app: guardian
  template:
    metadata:
      labels:
        app: guardian
    spec:
      containers:
      - name: webhook
        image: rohankapoor161/k8s-guardian:latest
        ports:
        - name: webhook
          containerPort: 8443
        volumeMounts:
        - name: certs
          mountPath: /etc/webhook/certs
          readOnly: true
      volumes:
      - name: certs
        secret:
          secretName: guardian-cert
